---
version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      spring:
        patterns:
          - "org.springframework*"
          - "io.spring*"
      testing:
        patterns:
          - "org.testcontainers*"
          - "org.junit*"
          - "org.mockito*"
          - "com.tngtech.archunit*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
