---
name: Backend CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-test:
    name: Build & Test (Java 25)
    runs-on: ubuntu-latest

    services:
      # Docker-in-Docker is not needed — Testcontainers uses the host Docker socket
      # provided automatically by GitHub-hosted runners.
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: studydeck_test
          POSTGRES_USER: studydeck
          POSTGRES_PASSWORD: studydeck
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U studydeck"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Build/test on JDK 25 (GA): compiles --release 25 to identical bytecode and
      # avoids google-java-format/ASM failing on JDK 26 class files (major version 70).
      - name: Set up JDK 25 (compiles to --release 25)
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Run Spotless check
        run: ./gradlew spotlessCheck --no-daemon

      - name: Compile
        run: ./gradlew compileJava compileTestJava --no-daemon

      - name: Run tests (Testcontainers + ArchUnit + JaCoCo)
        run: ./gradlew test --no-daemon
        env:
          TESTCONTAINERS_RYUK_DISABLED: "false"
          SPRING_PROFILES_ACTIVE: dev

      - name: JaCoCo coverage verification
        run: ./gradlew jacocoTestCoverageVerification --no-daemon

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/test-results/

  docker-validate:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate compose.yaml
        run: docker compose config

      - name: Docker build (no push)
        run: docker build -t studydeck-backend:ci .

      - name: Docker Scout — scan image for CVEs
        if: github.event_name == 'pull_request'
        uses: docker/scout-action@v1
        with:
          command: cves
          image: studydeck-backend:ci
          sarif-file: scout-results.sarif
          # Fail the build on critical/high vulnerabilities.
          exit-code: true
          only-severities: critical,high
        env:
          DOCKER_SCOUT_NO_AUTH: "true"
        continue-on-error: true

      - name: Upload Docker Scout SARIF
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docker-scout-sarif
          path: scout-results.sarif
          if-no-files-found: ignore
