# Disable all Ollama and OpenAI Spring AI auto-configurations in tests.
# These fail without valid connection details and are not needed — tests use stub AI beans.
spring.autoconfigure.exclude=\
  org.springframework.ai.model.ollama.autoconfigure.OllamaApiAutoConfiguration,\
  org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration,\
  org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiConnectionConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,\
  org.springframework.ai.model.transformers.autoconfigure.TransformersEmbeddingModelAutoConfiguration

# Allow @Primary test beans (from AiTestConfiguration) to override main configuration beans.
# Required because AiTestConfiguration and AiConfiguration both define beans with the same names.
spring.main.allow-bean-definition-overriding=true
