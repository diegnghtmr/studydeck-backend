global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: studydeck-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend:8080"]
        labels:
          application: studydeck-backend

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
