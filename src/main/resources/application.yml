spring:
  application:
    name: studydeck-backend

  # Datasource — credentials via environment variables only. Never hardcoded.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/studydeck}
    username: ${DB_USER:studydeck}
    password: ${DB_PASS:studydeck}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000

  jpa:
    # ALWAYS disable open-in-view to prevent lazy loading leaks in controllers.
    open-in-view: false
    hibernate:
      # Never auto-generate schema in any environment — Flyway owns the schema.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  threads:
    virtual:
      enabled: true

  # Note: Jackson 3.x (used by Spring Boot 4) changed serialization feature property names.
  # Configuring Jackson via application.yml is done in a dedicated @Configuration if needed.
  # spring.jackson.serialization.write-dates-as-timestamps is not supported in Jackson 3.x format.

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: StudyDeck AI Backend
    version: "@project.version@"
    description: "Modular hexagonal monolith — Java 25 + Spring Boot 4"

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    com.studydeck: DEBUG
    org.hibernate.SQL: INFO

---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    properties:
      hibernate:
        format_sql: false
    show-sql: false

logging:
  level:
    root: WARN
    com.studydeck: INFO
